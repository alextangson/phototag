# phototag Configuration
# Copy to ~/.phototag/config.yaml and customize

ollama:
  host: "http://localhost:11434"
  model: "gemma4:e4b"
  timeout: 60

schedule:
  start_hour: 1
  end_hour: 7
  check_interval: 10

load:
  max_memory_pressure: "warn"
  min_cpu_idle: 30
  pause_seconds: 300

dedup:
  hash_threshold: 5

layers:
  layer1_organize: true
  layer2_analyze: false
  layer3_brief: false
